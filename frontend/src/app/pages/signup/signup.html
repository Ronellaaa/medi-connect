<div class="min-h-screen signup-page flex items-center justify-center px-6 py-10">
  <div
    class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-10 items-center"
  >
    <!-- LEFT SIDE - FORM -->
    <div class="flex justify-center lg:justify-start order-2 lg:order-1">
      <div class="w-full max-w-3xl rounded-[32px] bg-white/85 backdrop-blur-xl shadow-2xl p-8 md:p-10 border border-white/60">
        <div class="mb-8">
          <p class="text-sm font-medium text-cyan-500 tracking-[0.2em] uppercase">
            Doctor Registration
          </p>
          <h1 class="text-4xl font-extrabold text-slate-800 mt-2 leading-tight">
            Create your professional account
          </h1>
          <p class="text-slate-500 mt-3 text-sm">
            Fill in your details to join the platform as a doctor.
          </p>
        </div>

        <form (ngSubmit)="onSignup()" class="space-y-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Full Name
              </label>
              <input
                type="text"
                [(ngModel)]="fullName"
                name="fullName"
                placeholder="Enter full name"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Email
              </label>
              <input
                type="email"
                [(ngModel)]="email"
                name="email"
                placeholder="Enter email"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Phone
              </label>
              <input
                type="text"
                [(ngModel)]="phone"
                name="phone"
                placeholder="Enter phone number"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Main Specialization
              </label>
              <input
                type="text"
                [(ngModel)]="mainSpecialization"
                name="mainSpecialization"
                placeholder="Eg: Cardiologist"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Additional Specialization
              </label>
              <input
                type="text"
                [(ngModel)]="additionalSpecialization"
                name="additionalSpecialization"
                placeholder="Enter additional specialization"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Qualifications
              </label>
              <input
                type="text"
                [(ngModel)]="qualifications"
                name="qualifications"
                placeholder="Eg: MBBS, MD"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Experience Years
              </label>
              <input
                type="number"
                [(ngModel)]="experienceYears"
                name="experienceYears"
                placeholder="Enter years"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                License
              </label>
              <input
                type="text"
                [(ngModel)]="license"
                name="license"
                placeholder="Enter license number"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Clinic / Hospital
              </label>
              <input
                type="text"
                [(ngModel)]="clinic"
                name="clinic"
                placeholder="Enter clinic or hospital"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Consultation Fee
              </label>
              <input
                type="text"
                [(ngModel)]="consultationFee"
                name="consultationFee"
                placeholder="Eg: 2500 LKR"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Availability
              </label>
              <input
                type="text"
                [(ngModel)]="availability"
                name="availability"
                placeholder="Eg: Mon - Fri, 6PM - 9PM"
                class="form-input"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Languages
              </label>
              <input
                type="text"
                [(ngModel)]="languages"
                name="languages"
                placeholder="Eg: English, Sinhala, Tamil"
                class="form-input"
              />
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Password
              </label>
              <div class="relative">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  [(ngModel)]="password"
                  name="password"
                  placeholder="Enter password"
                  class="form-input pr-14"
                />
                <button
                  type="button"
                  (click)="togglePassword()"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-slate-500 hover:text-cyan-500 transition"
                >
                  {{ showPassword ? 'Hide' : 'Show' }}
                </button>
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">
                Confirm Password
              </label>
              <div class="relative">
                <input
                  [type]="showConfirmPassword ? 'text' : 'password'"
                  [(ngModel)]="confirmPassword"
                  name="confirmPassword"
                  placeholder="Confirm password"
                  class="form-input pr-14"
                />
                <button
                  type="button"
                  (click)="toggleConfirmPassword()"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-slate-500 hover:text-cyan-500 transition"
                >
                  {{ showConfirmPassword ? 'Hide' : 'Show' }}
                </button>
              </div>
            </div>
          </div>

          <button
            type="submit"
            class="w-full rounded-2xl bg-gradient-to-r from-cyan-400 via-sky-400 to-violet-400 px-5 py-3.5 text-white font-bold shadow-lg hover:scale-[1.01] active:scale-[0.99] transition"
          >
            Create Account
          </button>

          <p class="text-center text-sm text-slate-500 mt-4">
            Already have an account?
            <a href="#" class="font-bold text-cyan-500 hover:text-cyan-600">Sign in</a>
          </p>
        </form>
      </div>
    </div>

    <!-- RIGHT SIDE - VISUAL -->
    <div class="flex justify-center order-1 lg:order-2">
      <div class="visual-wrapper">
        <div class="scene-360">
          <div
            class="drum-360"
            [style.transform]="'rotateY(-' + (currentIndex * 120) + 'deg)'"
          >
            <div
              class="card-360"
              *ngFor="let slide of slides; let i = index"
              [style.background]="slide.bg"
              [style.transform]="'rotateY(' + (i * 120) + 'deg) translateZ(420px)'"
            >
              <img [src]="slide.center" alt="center image" class="center-img" />

              <img
                *ngFor="let item of slide.items"
                [src]="item.img"
                alt="floating image"
                class="float-img"
                [style.left]="item.x"
                [style.top]="item.y"
                [style.animationDelay]="item.delay"
              />

              <h3>{{ slide.title }}</h3>
            </div>
          </div>

          <div class="dots-360">
            <span
              *ngFor="let dot of slides; let d = index"
              [class.active]="d === currentIndex"
              (click)="goToSlide(d)"
            ></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
