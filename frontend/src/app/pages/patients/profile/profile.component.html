<div class="profile-container">
  <div class="profile-header">
    <h1>My Profile</h1>
    <p>Manage your personal information</p>
  </div>

  <div class="profile-card">
    <div class="profile-actions">
      <button *ngIf="!isEditing" class="btn-edit" (click)="toggleEdit()">
        ✏️ Edit Profile
      </button>
      <div *ngIf="isEditing" class="action-buttons">
        <button class="btn-save" (click)="onSubmit()" [disabled]="isLoading">Save Changes</button>
        <button class="btn-cancel" (click)="toggleEdit()">Cancel</button>
      </div>
    </div>

    <form [formGroup]="profileForm">
      <div class="form-row">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" formControlName="firstName" [readonly]="!isEditing">
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" formControlName="lastName" [readonly]="!isEditing">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" formControlName="phoneNumber" [readonly]="!isEditing">
        </div>
        <div class="form-group">
          <label>Date of Birth *</label>
          <input type="date" formControlName="dateOfBirth" [readonly]="!isEditing">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Gender *</label>
          <select formControlName="gender" [disabled]="!isEditing">
            <option value="MALE">Male</option>
            <option value="FEMALE">Female</option>
            <option value="OTHER">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Blood Group</label>
          <select formControlName="bloodGroup" [disabled]="!isEditing">
            <option value="">Select</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea formControlName="address" rows="3" [readonly]="!isEditing" placeholder="Your address"></textarea>
      </div>

      <div class="form-group">
        <label>Emergency Contact</label>
        <input type="text" formControlName="emergencyContact" [readonly]="!isEditing" placeholder="Emergency contact number">
      </div>
    </form>
  </div>
</div>
