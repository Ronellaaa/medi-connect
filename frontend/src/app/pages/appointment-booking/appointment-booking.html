<main class="appointment-booking-page">
  <section class="appointment-booking-shell">
    <div class="booking-shell-header">
      <button class="booking-back-button" type="button" routerLink="/appointments/results">
        <mat-icon>arrow_back</mat-icon>
        <span>Back</span>
      </button>
      <h1 class="booking-shell-title">Book an Appointment</h1>
    </div>

    <div class="booking-doctor-card">
      <div class="booking-doctor-visual">
        <img class="booking-doctor-image" src="/doctor-watcher.png" alt="Doctor profile" />
      </div>
      <div class="booking-doctor-copy">
        <h2 class="booking-doctor-name">Dr. John Smith</h2>
        <p class="booking-doctor-role">Cardiologist</p>
        <div class="booking-doctor-hospital">
          <mat-icon>local_hospital</mat-icon>
          <span>City General Hospital</span>
        </div>
      </div>
    </div>

    <form class="booking-form-card" novalidate>
      <div class="booking-form-grid booking-form-grid-top">
        <article class="booking-field-card">
          <div class="booking-field-card-header">
            <mat-icon>calendar_month</mat-icon>
            <h3 class="booking-field-card-title">Choose Date</h3>
          </div>
          <label class="booking-form-field">
            <span class="booking-form-prefix">
              <mat-icon>event</mat-icon>
            </span>
            <input
              class="booking-form-input booking-form-input-date"
              type="date"
              name="booking-date"
              [(ngModel)]="selectedDate"
              value="2026-04-25"
            />
          </label>
        </article>

        <article class="booking-field-card">
          <div class="booking-field-card-header">
            <mat-icon>schedule</mat-icon>
            <h3 class="booking-field-card-title">Choose Time</h3>
          </div>
          <label class="booking-form-field">
            <span class="booking-form-prefix">
              <mat-icon>schedule</mat-icon>
            </span>
            <input
              class="booking-form-input"
              type="time"
              name="booking-time"
              [(ngModel)]="selectedTime"
              value="10:00"
            />
          </label>
        </article>
      </div>

      <article class="booking-field-card booking-field-card-full">
        <div class="booking-field-card-header">
          <mat-icon>person</mat-icon>
          <h3 class="booking-field-card-title">Full Name</h3>
        </div>
        <label class="booking-form-field">
          <span class="booking-form-prefix">
            <mat-icon>badge</mat-icon>
          </span>
          <input
            class="booking-form-input"
            type="text"
            name="fullName"
            [(ngModel)]="fullName"
            placeholder="Enter your name"
            required="true"
          />
        </label>
      </article>
      <div class="booking-form-grid">
        <article class="booking-field-card booking-field-card-full">
          <div class="booking-field-card-header">
            <mat-icon>phone_iphone</mat-icon>
            <h3 class="booking-field-card-title">Mobile Number</h3>
          </div>
          <label class="booking-form-field">
            <span class="booking-form-prefix">
              <mat-icon>call</mat-icon>
            </span>
            <input
              class="booking-form-input"
              type="tel"
              name="mobileNumber"
              [(ngModel)]="mobileNumber"
              placeholder="+94 Enter your phone number"
            />
          </label>
        </article>

        <article class="booking-field-card booking-field-card-full">
          <div class="booking-field-card-header">
            <mat-icon>person</mat-icon>
            <h3 class="booking-field-card-title">Age</h3>
          </div>
          <label class="booking-form-field">
            <span class="booking-form-prefix">
              <mat-icon>person</mat-icon>
            </span>
            <input
              class="booking-form-input"
              name="age"
              type="number"
              [(ngModel)]="age"
              placeholder="Enter your age"
            />
          </label>
        </article>
      </div>

      <div class="booking-form-grid">
        <article class="booking-field-card">
          <div class="booking-field-card-header">
            <mat-icon>email</mat-icon>
            <h3 class="booking-field-card-title">Email</h3>
          </div>
          <label class="booking-form-field">
            <span class="booking-form-prefix">
              <mat-icon>alternate_email</mat-icon>
            </span>
            <input
              class="booking-form-input"
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="Enter your email"
            />
          </label>
        </article>

   
      </div>

      <label class="booking-terms">
        <input class="booking-terms-checkbox" type="checkbox" checked />
        <span>I agree to the Terms and Conditions.</span>
      </label>

      <button class="booking-confirm-button" type="button" [disabled]="isSubmitting" (click)="confirmBooking()">
          {{ isSubmitting ? 'Booking...' : 'Confirm Booking' }}

      </button>
    </form>

    <div class="booking-modal-backdrop" *ngIf="showSuccessModal">
  <div class="booking-modal">
    <h2 class="booking-modal-title">Appointment Confirmed</h2>
    <p class="booking-modal-text">
      {{ successModalText }}
    </p>
    <button class="booking-modal-button" type="button" (click)="closeSuccessModal()">
      OK
    </button>
  </div>
</div>

  </section>
</main>
