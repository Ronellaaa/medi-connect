<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.sidebar-collapsed]="!sidebarOpen">
    <div class="sidebar-header">
      <div class="logo" *ngIf="sidebarOpen">
        <span class="logo-icon">🏥</span>
        <span class="logo-text">MediConnect</span>
      </div>
      <div class="logo-icon-only" *ngIf="!sidebarOpen">
        <span class="logo-icon">🏥</span>
      </div>
      <button class="toggle-btn" (click)="toggle()">
        <span class="toggle-icon">{{ sidebarOpen ? '◀' : '▶' }}</span>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a 
        routerLink="/admin/dashboard" 
        routerLinkActive="active"
        class="nav-item"
        [class.nav-item-collapsed]="!sidebarOpen"
      >
        <span class="nav-icon">📊</span>
        <span class="nav-text" *ngIf="sidebarOpen">Dashboard</span>
        <span class="tooltip" *ngIf="!sidebarOpen">Dashboard</span>
      </a>

      <a 
        routerLink="/admin/patients" 
        routerLinkActive="active"
        class="nav-item"
        [class.nav-item-collapsed]="!sidebarOpen"
      >
        <span class="nav-icon">👥</span>
        <span class="nav-text" *ngIf="sidebarOpen">Manage Patients</span>
        <span class="tooltip" *ngIf="!sidebarOpen">Manage Patients</span>
      </a>

      <a 
        routerLink="/admin/stats" 
        routerLinkActive="active"
        class="nav-item"
        [class.nav-item-collapsed]="!sidebarOpen"
      >
        <span class="nav-icon">📈</span>
        <span class="nav-text" *ngIf="sidebarOpen">Full Stats</span>
        <span class="tooltip" *ngIf="!sidebarOpen">Full Stats</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" *ngIf="sidebarOpen">
        <div class="user-avatar">
          {{ adminName.charAt(0).toUpperCase() }}
        </div>
        <div class="user-details">
          <div class="user-name">{{ adminName }}</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <div class="user-avatar-small" *ngIf="!sidebarOpen" [title]="adminName">
        {{ adminName.charAt(0).toUpperCase() }}
      </div>
      <button class="logout-btn" (click)="logout()">
        <span class="nav-icon">🚪</span>
        <span class="nav-text" *ngIf="sidebarOpen">Logout</span>
        <span class="tooltip" *ngIf="!sidebarOpen">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" [class.main-content-expanded]="!sidebarOpen">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
