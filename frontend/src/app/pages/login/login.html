<div class="min-h-screen login-page flex items-center justify-center px-6 py-10">
  <div
    class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-10 items-center"
  >
    <!-- LEFT SIDE - FORM -->
    <div class="flex justify-center lg:justify-start order-2 lg:order-1">
      <div class="w-full max-w-md rounded-[32px] bg-white/80 backdrop-blur-xl shadow-2xl p-8 md:p-10 border border-white/60">
        <div class="mb-8">
          <p class="text-sm font-medium text-pink-500 tracking-[0.2em] uppercase">
            Welcome back
          </p>
          <h1 class="text-4xl font-extrabold text-slate-800 mt-2 leading-tight">
            Sign in as {{ selectedRole | lowercase }}
          </h1>
          <p class="text-slate-500 mt-3 text-sm">
            Use the same login UI for doctor, patient, or admin access.
          </p>
        </div>

        <div class="mb-6 flex flex-wrap gap-2">
          <button type="button" (click)="selectRole('DOCTOR')" [class]="selectedRole === 'DOCTOR' ? 'rounded-full bg-pink-500 px-4 py-2 text-xs font-bold text-white' : 'rounded-full bg-slate-100 px-4 py-2 text-xs font-bold text-slate-600'">Doctor</button>
          <button type="button" (click)="selectRole('PATIENT')" [class]="selectedRole === 'PATIENT' ? 'rounded-full bg-pink-500 px-4 py-2 text-xs font-bold text-white' : 'rounded-full bg-slate-100 px-4 py-2 text-xs font-bold text-slate-600'">Patient</button>
          <button type="button" (click)="selectRole('ADMIN')" [class]="selectedRole === 'ADMIN' ? 'rounded-full bg-pink-500 px-4 py-2 text-xs font-bold text-white' : 'rounded-full bg-slate-100 px-4 py-2 text-xs font-bold text-slate-600'">Admin</button>
        </div>

        <form (ngSubmit)="onLogin()" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
              Email
            </label>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="Enter your email"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 text-sm outline-none transition focus:border-pink-400 focus:ring-4 focus:ring-pink-100"
            />
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
              Password
            </label>

            <div class="relative">
              <input
                [type]="showPassword ? 'text' : 'password'"
                [(ngModel)]="password"
                name="password"
                placeholder="Enter your password"
                class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 pr-14 text-sm outline-none transition focus:border-pink-400 focus:ring-4 focus:ring-pink-100"
              />

              <button
                type="button"
                (click)="togglePassword()"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-slate-500 hover:text-pink-500 transition"
              >
                {{ showPassword ? 'Hide' : 'Show' }}
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-slate-600 cursor-pointer">
              <input type="checkbox" class="rounded border-slate-300" />
              Remember me
            </label>

            <a href="#" class="font-semibold text-pink-500 hover:text-pink-600 transition">
              Forgot password?
            </a>
          </div>

          <button
            type="submit"
            class="w-full rounded-2xl bg-gradient-to-r from-pink-400 via-fuchsia-400 to-purple-400 px-5 py-3.5 text-white font-bold shadow-lg hover:scale-[1.01] active:scale-[0.99] transition"
          >
            Sign In
          </button>

          <p *ngIf="message" class="text-sm font-semibold text-slate-600">
            {{ message }}
          </p>

          <div class="relative flex items-center justify-center py-2">
            <span class="absolute inset-x-0 h-px bg-slate-200"></span>
            <span class="relative bg-white px-4 text-sm text-slate-400">or</span>
          </div>

          <button
            type="button"
            class="w-full rounded-2xl border border-slate-200 bg-white px-5 py-3.5 text-slate-700 font-semibold hover:border-pink-300 hover:text-pink-500 transition"
          >
            Continue with Google
          </button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-7">
          Don’t have an account?
          <a routerLink="/register" class="font-bold text-pink-500 hover:text-pink-600">Sign up</a>
        </p>
      </div>
    </div>

    <!-- RIGHT SIDE - 3D VISUAL -->
    <div class="flex justify-center order-1 lg:order-2">
      <div class="visual-wrapper">
        <div class="scene-360">
          <div
            class="drum-360"
            [style.transform]="'rotateY(-' + (currentIndex * 120) + 'deg)'"
          >
            <div
              class="card-360"
              *ngFor="let slide of slides; let i = index"
              [style.background]="slide.bg"
              [style.transform]="'rotateY(' + (i * 120) + 'deg) translateZ(420px)'"
            >
              <img [src]="slide.center" alt="center image" class="center-img" />

              <img
                *ngFor="let item of slide.items"
                [src]="item.img"
                alt="floating image"
                class="float-img"
                [style.left]="item.x"
                [style.top]="item.y"
                [style.animationDelay]="item.delay"
              />

              <h3>{{ slide.title }}</h3>
            </div>
          </div>

          <div class="dots-360">
            <span
              *ngFor="let dot of slides; let d = index"
              [class.active]="d === currentIndex"
              (click)="goToSlide(d)"
            ></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
