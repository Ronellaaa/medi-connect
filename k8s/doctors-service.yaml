apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctors-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctors-service
  template:
    metadata:
      labels:
        app: doctors-service
    spec:
      containers:
        - name: doctors-service
          image: ronella/doctors-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.minikube.internal:5434/doctors_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "1234"
---
apiVersion: v1
kind: Service
metadata:
  name: doctors-service
spec:
  selector:
    app: doctors-service
  ports:
    - port: 8083
      targetPort: 8083
