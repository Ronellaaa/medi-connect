apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
  namespace: medi-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-service
  template:
    metadata:
      labels:
        app: payments-service
    spec:
      containers:
        - name: payments-service
          image: ronella/payments-service:1.0-amd64
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            - name: SERVER_PORT
              value: "8085"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://payments-db:5432/payment_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: payment-password
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "org.postgresql.Driver"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: "org.hibernate.dialect.PostgreSQLDialect"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx512m"
            - name: PAYHERE_MERCHANT_ID
              valueFrom:
                secretKeyRef:
                  name: payhere-secrets
                  key: merchant-id
            - name: PAYHERE_MERCHANT_SECRET
              valueFrom:
                secretKeyRef:
                  name: payhere-secrets
                  key: merchant-secret
            - name: PAYHERE_BASE_URL
              value: "https://sandbox.payhere.lk"
            - name: PAYHERE_RETURN_URL
              value: "http://localhost:4200/appointments/patient-dashboard"
            - name: PAYHERE_CANCEL_URL
              value: "http://localhost:4200/payment/cancel"
            - name: PAYHERE_NOTIFY_URL
              value: "https://keisha-pseudocollegiate-alison.ngrok-free.dev/api/payments/webhook/payhere"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:8088"
            - name: TELEMEDICINE_SERVICE_URL
              value: "http://telemedicine-service:3001"
---
apiVersion: v1
kind: Service
metadata:
  name: payments-service
  namespace: medi-connect
spec:
  selector:
    app: payments-service
  ports:
    - port: 8085
      targetPort: 8085
