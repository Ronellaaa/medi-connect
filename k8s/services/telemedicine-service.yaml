apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service
  namespace: medi-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
        - name: telemedicine-service
          image: ronella/telemedicine-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: telemedicine-password
            - name: DB_HOST
              value: "telemedicine-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "telemedicine"
            - name: PAYMENT_SERVICE_URL
              value: "http://payments-service:8085"
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service
  namespace: medi-connect
spec:
  selector:
    app: telemedicine-service
  ports:
    - port: 3001
      targetPort: 3001
