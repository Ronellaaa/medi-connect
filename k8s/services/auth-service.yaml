apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: medi-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ronella/auth-service:1.0-amd64
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://auth-db:5432/auth_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: auth-password
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "org.postgresql.Driver"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: "org.hibernate.dialect.PostgreSQLDialect"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx512m"
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: APP_JWT_EXPIRATION
              value: "86400000"
            - name: SERVICES_DOCTOR_BASE_URL
              value: "http://doctors-service:8083"
            - name: SERVICES_PATIENT_BASE_URL
              value: "http://patients-service:8082"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: medi-connect
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
