apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: medi-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: ronella/appointment-service:1.0-amd64
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
          env:
            - name: SERVER_PORT
              value: "8088"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://appointments-db:5432/mediconnectdb"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: appointment-password
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "org.postgresql.Driver"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: "org.hibernate.dialect.PostgreSQLDialect"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx512m"
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: APP_JWT_EXPIRATION
              value: "86400000"
            - name: PATIENTS_SERVICE_URL
              value: "http://patients-service:8082"
            - name: DOCTORS_SERVICE_URL
              value: "http://doctors-service:8083"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: medi-connect
spec:
  selector:
    app: appointment-service
  ports:
    - port: 8088
      targetPort: 8088
