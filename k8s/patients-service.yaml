apiVersion: apps/v1
kind: Deployment
metadata:
  name: patients-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patients-service
  template:
    metadata:
      labels:
        app: patients-service
    spec:
      containers:
        - name: patients-service
          image: ronella/patients-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.minikube.internal:5437/patient_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "123456"
            - name: DOCTOR_SERVICE_URL
              value: "http://doctors-service:8083"
---
apiVersion: v1
kind: Service
metadata:
  name: patients-service
spec:
  selector:
    app: patients-service
  ports:
    - port: 8082
      targetPort: 8082
